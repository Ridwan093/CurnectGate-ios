name: curnectgate
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.2.1
  timezone: ^0.10.0
  intl: ^0.20.0
  dio: ^5.4.0
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.4.6
  firebase_auth: ^5.5.4
  image_picker: ^1.1.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.15
  flutter_cache_manager: ^3.3.0
  auto_route: ^5.0.0
  table_calendar: ^3.2.0
  share_plus: ^7.0.0
  open_filex: ^4.7.0
  file_picker: ^10.2.0
  url_launcher: ^6.3.1
  mobile_scanner: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/actions/
    - assets/icons/auth/
    - assets/icons/dashboard/
    - assets/icons/emergency/
    - assets/icons/member/
    - assets/icons/nav/
    - assets/icons/utility/
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/action/

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/lato/Lato-Regular.ttf
        - asset: assets/fonts/lato/Lato-Bold.ttf
          weight: 700

    - family: InterDisplay
      fonts:
        - asset: assets/fonts/inter_display/InterDisplay-Regular.ttf
        - asset: assets/fonts/inter_display/InterDisplay-Bold.ttf
          weight: 700
