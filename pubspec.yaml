name: curnectgate
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+9

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.2.1
  timezone: ^0.10.0
  intl: ">=0.19.0 <0.21.0"
  dio: ^5.4.0
  flutter_launcher_icons: ^0.14.4
  firebase_core: 2.32.0
  firebase_messaging: 14.7.10
  firebase_analytics: 10.10.7
  flutter_localization: ^0.3.3
  image_picker: ^1.1.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.15
  flutter_cache_manager: ^3.3.0
  auto_route: ^10.1.0+1
  table_calendar: ^3.1.3
  share_plus: ^11.0.0
  open_filex: ^4.7.0
  file_picker: ^10.2.0
  url_launcher: ^6.3.1
  signature: ^6.3.0
  crypto: ^3.0.6
  flutter_paystack_plus: ^2.3.0
  pdfx: ^2.9.2
  confetti: ^0.8.0
  qr_code_scanner_plus: ^2.0.12
  device_info_plus: ^12.1.0
  package_info_plus: ^9.0.0
  local_auth: ^2.3.0
  go_router: ^16.0.0
  qr_flutter: ^4.1.0
  pin_code_fields: ^8.0.1
  smooth_page_indicator: ^1.0.0+2
  cached_network_image: ^3.2.3
  permission_handler: ^12.0.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  device_preview: ^1.2.0
  dart_pusher_channels: ^1.2.3
  screenshot: ^3.0.0
  pdf: ^3.11.3
  upgrader: ^12.5.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9

  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  freezed: ^2.4.6
  

flutter:
  uses-material-design: true

  assets:
    - assets/icons/actions/
    - assets/icons/auth/
    - assets/icons/dashboard/
    - assets/icons/emergency/
    - assets/icons/member/
    - assets/icons/nav/
    - assets/icons/utility/
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/action/
    - assets/icons/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png" # <-- your icon path
  remove_alpha_ios: true

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/lato/Lato-Regular.ttf
        - asset: assets/fonts/lato/Lato-Bold.ttf
          weight: 700

    - family: InterDisplay
      fonts:
        - asset: assets/fonts/inter_display/InterDisplay-Regular.ttf
        - asset: assets/fonts/inter_display/InterDisplay-Bold.ttf
          weight: 700
