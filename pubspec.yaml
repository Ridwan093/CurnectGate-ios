name: curnectgate
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.2.1
  timezone: ^0.10.0
  intl: ^0.20.0
  dio: ^5.4.0
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_auth: ^6.0.0
  image_picker: ^1.1.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.15
  flutter_cache_manager: ^3.3.0
  auto_route: ^10.1.0+1
  table_calendar: ^3.2.0
  share_plus: ^11.0.0
  open_filex: ^4.7.0
  file_picker: ^10.2.0
  url_launcher: ^6.3.1
  mobile_scanner: ^7.0.1
  go_router: ^16.0.0
  qr_flutter: ^4.1.0
  pin_code_fields: ^8.0.1
  smooth_page_indicator: ^1.0.0+2
  cached_network_image: ^3.2.3
  
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  freezed: ^2.4.6
  

flutter:
  uses-material-design: true

  assets:
    - assets/icons/actions/
    - assets/icons/auth/
    - assets/icons/dashboard/
    - assets/icons/emergency/
    - assets/icons/member/
    - assets/icons/nav/
    - assets/icons/utility/
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/action/

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/lato/Lato-Regular.ttf
        - asset: assets/fonts/lato/Lato-Bold.ttf
          weight: 700

    - family: InterDisplay
      fonts:
        - asset: assets/fonts/inter_display/InterDisplay-Regular.ttf
        - asset: assets/fonts/inter_display/InterDisplay-Bold.ttf
          weight: 700
