workflows:
  ios-release:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: curnectgate_api_key
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          # Try to pull certificates from the environment groups
          keychain add-certificates
          # List what was found
          keychain list-certificates
          # Fetch signing files with verbose logging
          app-store-connect fetch-signing-files "com.ges.curnectgate" --type IOS_APP_STORE --verbose
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          flutter packages pub get
          cd ios && pod install && cd ..
          flutter build ipa --release --build-number=6 --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
