workflows:
  ios-release:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: curnectgate_api_key
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Hard-Fix Code Signing
        script: |
          # 1. Prepare files from your Codemagic variables
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          keychain initialize
          
          # 2. Fix trust issues with Intermediate Certificate
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer > /tmp/WWDR.cer
          keychain add-certificates --certificate /tmp/WWDR.cer
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          
          # 3. Install your profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # 4. Extract UUID and Name
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          echo "Using Profile: $PROFILE_NAME ($UUID)"

          # DETECTIVE WORK: Print the permissions inside this profile
          echo "--- Profile Entitlements ---"
          /usr/libexec/PlistBuddy -c "Print Entitlements" /tmp/profile.plist || true
          echo "----------------------------"

          # 5. AGGRESSIVELY patch the project to Manual Signing
          PROJECT=ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' $PROJECT
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = 5648G3VS73;/g' $PROJECT
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";/g" $PROJECT
          sed -i '' "s/PROVISIONING_PROFILE = .*;/PROVISIONING_PROFILE = \"$UUID\";/g" $PROJECT
          sed -i '' 's/CODE_SIGN_STYLE = .*;/CODE_SIGN_STYLE = Manual;/g' $PROJECT
          sed -i '' 's/CODE_SIGN_IDENTITY = .*;/CODE_SIGN_IDENTITY = "Apple Distribution";/g' $PROJECT
          
          # 6. Create ExportOptions
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>5648G3VS73</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ges.curnectgate</key>
              <string>$UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Flutter build ipa
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          # The signing settings are already patched into the project file by the previous step!
          flutter build ipa --release --build-number=6 \
            --export-options-plist=/tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
