workflows:
  ios-release:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: curnectgate_api_key
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Fetch signing files
        script: |
          # Create temporary files
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          
          # Initialize keychain and add certificates
          keychain initialize
          
          # Download Apple intermediate certificate (fixes 'invalid certificate' errors)
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer > /tmp/WWDR.cer
          keychain add-certificates --certificate /tmp/WWDR.cer
          
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          
          # Install profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          # We use "ad-hoc" which is easier to build. You can still upload this to Apple!
          flutter build ipa --release --build-number=6 --export-method ad-hoc
    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/clone/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
