workflows:
  ios-release:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: curnectgate_api_key
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          # This command automatically finds your certs/profiles from Apple using your API key
          app-store-connect fetch-signing-files "com.ges.curnectgate" --type IOS_APP_STORE --install
          xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          flutter build ipa --release --build-number=6
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
