workflows:
  ios-release:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: curnectgate_api_key
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Fetch signing files
        script: |
          # Create temporary files from the base64 strings you pasted
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          
          # Initialize keychain and add the certificate
          keychain initialize
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          
          # Install the provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # List certificates to verify
          keychain list-certificates
      - name: Set up code signing
        script: |
          xcode-project use-profiles
          # Find the name of the profile we installed
          PROV_PROFILE_NAME=$(grep -aA1 "Name" ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | grep "<string>" | sed -e 's/<string>//' -e 's/<\/string>//' | tr -d '[:space:]' | head -n 1)
          echo "Detected Profile Name: $PROV_PROFILE_NAME"
          
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>5648G3VS73</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ges.curnectgate</key>
              <string>$PROV_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Flutter build ipa
        script: |
          flutter config --no-enable-swift-package-manager
          flutter packages pub get
          cd ios && pod install && cd ..
          flutter build ipa --release --build-number=6 --export-options-plist=/tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/clone/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
