workflows:
  ios-release:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: curnectgate_api_key
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Fetch signing files
        script: |
          # Create temporary files from the base64 strings you pasted
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          
          # Initialize keychain and add the certificate
          keychain initialize
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          
          # Install the provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # List certificates to verify
          keychain list-certificates
          
          # Fetch final signing files (this should now succeed because it sees the certificate)
          app-store-connect fetch-signing-files "com.ges.curnectgate" --type IOS_APP_STORE --verbose
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Flutter build ipa
        script: |
          flutter packages pub get
          cd ios && pod install && cd ..
          flutter build ipa --release --build-number=6 --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
