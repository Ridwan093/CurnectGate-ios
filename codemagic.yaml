workflows:
  ios-release:
    name: iOS App Store Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: curnectgate_api_key
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
    scripts:
      - name: Fetch signing files
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          keychain initialize
          
          # Download Apple intermediate certificate
          curl -sL https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer > /tmp/WWDR.cer
          keychain add-certificates --certificate /tmp/WWDR.cer
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          
          # Install profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Force the project to use the correct Team ID (YP44JNDYC6)
          sed -i '' 's/DEVELOPMENT_TEAM = 5648G3VS73/DEVELOPMENT_TEAM = YP44JNDYC6/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Detect the exact profile name from the file
          PROV_PROFILE_NAME=$(grep -aA1 "Name" ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | grep "<string>" | sed -e 's/<string>//' -e 's/<\/string>//' | tr -d '[:space:]' | head -n 1)
          
          # Create a bulletproof ExportOptions.plist with the CORRECT Team ID
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>YP44JNDYC6</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ges.curnectgate</key>
              <string>$PROV_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Flutter build ipa
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          flutter build ipa --release --build-number=6 --export-options-plist=/tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/clone/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
